name: Build CLI Hub (Tauri)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: cli-hub-tauri
        run: npm ci

      - name: Build Tauri (macOS arm64)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: cli-hub-tauri
          args: --target aarch64-apple-darwin --bundles app
          tauriScript: npx tauri

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-tauri-macos-arm64
          path: cli-hub-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: cli-hub-tauri
        run: npm ci

      - name: Build Tauri (Windows amd64)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: cli-hub-tauri
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi
          tauriScript: npx tauri

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-msi
          path: cli-hub-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload Windows NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-nsis
          path: cli-hub-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: List build outputs (debug)
        run: Get-ChildItem cli-hub-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/cli-hub-tauri.exe -ErrorAction SilentlyContinue || echo "not found at expected path"

      - name: Upload Windows Portable artifact (raw binary)
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-portable
          path: cli-hub-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/cli-hub-tauri.exe
          if-no-files-found: error
