name: Build CLI Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95

      - name: Build frontend
        working-directory: cli-hub/frontend
        run: |
          npm install
          npm run build

      - name: Build macOS (arm64)
        working-directory: cli-hub
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 build

      - name: Package macOS .app bundle
        working-directory: cli-hub
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 task darwin:package

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-macos-arm64
          path: |
            cli-hub/bin/cli-hub
            cli-hub/bin/cli-hub.app/**/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95

      - name: Build frontend
        working-directory: cli-hub/frontend
        run: |
          npm install
          npm run build

      - name: Build Windows (amd64)
        working-directory: cli-hub
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          wails3 build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-amd64
          path: cli-hub/bin/cli-hub.exe

      - name: Build Windows debug (amd64)
        working-directory: cli-hub
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          wails3 build DEV=true EXTRA_TAGS=devtools

      - name: Upload Windows debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-amd64-debug
          path: cli-hub/bin/cli-hub.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: cli-hub/frontend
        run: |
          npm install
          npm run build

      - name: Build Linux (amd64)
        working-directory: cli-hub
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-linux-amd64
          path: cli-hub/bin/cli-hub
