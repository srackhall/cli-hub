<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wails.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    </style>
    <link rel="stylesheet" href="/style.css" />
    <title>CLI Hub</title>
    <script>
      (function() {
        var t = localStorage.getItem('cli-hub-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Intercept Wails native file drop so React components can hear it.
      // Wails' HandlePlatformFileDrop only does an RPC callback to Go — it never
      // fires a DOM event. We patch it once _wails is ready.
      (function patch() {
        var w = window._wails;
        if (!w || !w.handlePlatformFileDrop) {
          return setTimeout(patch, 5);
        }
        var orig = w.handlePlatformFileDrop;
        w.handlePlatformFileDrop = function(filenames, x, y) {
          orig.apply(w, arguments);
          var el = document.elementFromPoint(x, y);
          var target = el && el.closest('[data-file-drop-target]');
          if (target) {
            target.dispatchEvent(new CustomEvent('wails:filesdropped', {
              bubbles: true,
              detail: { files: filenames }
            }));
          }
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
