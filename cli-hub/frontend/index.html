<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wails.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    </style>
    <link rel="stylesheet" href="/style.css" />
    <title>CLI Hub</title>
    <script>
      (function() {
        var t = localStorage.getItem('cli-hub-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Early log sink — routes to real logger if loaded, else buffers to __earlyLogs.
      // This avoids the race between monkey-patch polling and logger.ts module load.
      window.__earlyLogs = [];
      window.__log = function(level, msg) {
        var L = window.__logger;
        if (L) { L[level](msg); return; }
        window.__earlyLogs.push({ts: Date.now(), level: level, msg: msg});
      };
      window.__log('info', 'BUILD: 2026-05-23-v3 file-props-enum');

      // Pre-set flags the Wails runtime checks before Go-side execJS syncs them.
      // Without this, canResolveFilePaths() returns false due to a race between
      // the first drop event and the NavigationCompleted callback.
      window._wails = window._wails || {};
      window._wails.flags = window._wails.flags || {};
      window._wails.flags.enableFileDrop = true;

      // Intercept Wails native file drop so React components can hear it.
      // Go calls execJS("window._wails.handlePlatformFileDrop(filenamesJSON, x, y)").
      // We must provide this function. Wails runtime (index.ts:74) will try to overwrite
      // it with its own RPC-only version, so we use defineProperty to trap assignments.
      var ourHandler = function(filenames, x, y) {
        window.__log('debug', 'handlePlatformFileDrop called filenames=' + JSON.stringify(filenames) + ' x=' + x + ' y=' + y);
        var el = document.elementFromPoint(x, y);
        var target = el && el.closest('[data-file-drop-target]');
        // Fallback: use the last cached drop target if elementFromPoint misses
        if (!target && window.__lastDropTarget) {
          window.__log('debug', 'handlePlatformFileDrop: elementFromPoint missed, using __lastDropTarget fallback');
          target = window.__lastDropTarget;
          delete window.__lastDropTarget;
        }
        if (target) {
          window.__log('debug', 'handlePlatformFileDrop: dispatching wails:filesdropped on target');
          target.dispatchEvent(new CustomEvent('wails:filesdropped', {
            bubbles: true,
            detail: { files: filenames }
          }));
        } else {
          window.__log('warn', 'handlePlatformFileDrop: NO drop target at x=' + x + ' y=' + y);
        }
      };
      window._wails.handlePlatformFileDrop = ourHandler;
      Object.defineProperty(window._wails, 'handlePlatformFileDrop', {
        configurable: true,
        enumerable: true,
        get: function() { return ourHandler; },
        set: function(v) {
          window.__log('debug', 'handlePlatformFileDrop: Wails runtime overwrite intercepted, preserving our handler');
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
