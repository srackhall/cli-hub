<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wails.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    </style>
    <link rel="stylesheet" href="/style.css" />
    <title>CLI Hub</title>
    <script>
      (function() {
        var t = localStorage.getItem('cli-hub-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Early log sink — routes to real logger if loaded, else buffers to __earlyLogs.
      // This avoids the race between monkey-patch polling and logger.ts module load.
      window.__earlyLogs = [];
      window.__log = function(level, msg) {
        var L = window.__logger;
        if (L) { L[level](msg); return; }
        window.__earlyLogs.push({ts: Date.now(), level: level, msg: msg});
      };

      // Intercept Wails native file drop so React components can hear it.
      // Wails' HandlePlatformFileDrop only does an RPC callback to Go — it never
      // fires a DOM event. We patch it once _wails is ready.
      (function patch() {
        var attempts = 0;
        var MAX_POLL = 600;
        var w = window._wails;
        if (!w || !w.handlePlatformFileDrop) {
          attempts++;
          if (attempts > MAX_POLL) {
            window.__log('error', 'monkey-patch: TIMEOUT after 3s! _wails=' + JSON.stringify(window._wails));
            window.__dd_patch_status = 'timeout';
            return;
          }
          return setTimeout(patch, 5);
        }
        window.__log('info', 'monkey-patch: _wails.handlePlatformFileDrop found, enableFileDrop=' + (w.flags && w.flags.enableFileDrop) + ' chrome.webview=' + !!(window.chrome && window.chrome.webview && window.chrome.webview.postMessageWithAdditionalObjects));
        var orig = w.handlePlatformFileDrop;
        w.handlePlatformFileDrop = function(filenames, x, y) {
          window.__log('debug', 'handlePlatformFileDrop called filenames=' + JSON.stringify(filenames) + ' x=' + x + ' y=' + y);
          orig.apply(w, arguments);
          var el = document.elementFromPoint(x, y);
          var target = el && el.closest('[data-file-drop-target]');
          if (target) {
            window.__log('debug', 'monkey-patch: dispatching wails:filesdropped on target');
            target.dispatchEvent(new CustomEvent('wails:filesdropped', {
              bubbles: true,
              detail: { files: filenames }
            }));
          } else {
            window.__log('warn', 'monkey-patch: NO drop target at coordinates x=' + x + ' y=' + y);
          }
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
