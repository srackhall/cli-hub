<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wails.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    </style>
    <link rel="stylesheet" href="/style.css" />
    <title>CLI Hub</title>
    <script>
      (function() {
        var t = localStorage.getItem('cli-hub-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Early log sink — routes to real logger if loaded, else buffers to __earlyLogs.
      // This avoids the race between monkey-patch polling and logger.ts module load.
      window.__earlyLogs = [];
      window.__log = function(level, msg) {
        var L = window.__logger;
        if (L) { L[level](msg); return; }
        window.__earlyLogs.push({ts: Date.now(), level: level, msg: msg});
      };

      // Intercept Wails native file drop so React components can hear it.
      // Wails' HandlePlatformFileDrop only does an RPC callback to Go — it never
      // fires a DOM event. Go calls execJS("window._wails.handlePlatformFileDrop(...)")
      // so we create it proactively (no polling needed).
      window._wails = window._wails || {};
      window._wails.handlePlatformFileDrop = function(filenames, x, y) {
        window.__log('debug', 'handlePlatformFileDrop called filenames=' + JSON.stringify(filenames) + ' x=' + x + ' y=' + y);
        var el = document.elementFromPoint(x, y);
        var target = el && el.closest('[data-file-drop-target]');
        if (target) {
          window.__log('debug', 'handlePlatformFileDrop: dispatching wails:filesdropped on target');
          target.dispatchEvent(new CustomEvent('wails:filesdropped', {
            bubbles: true,
            detail: { files: filenames }
          }));
        } else {
          window.__log('warn', 'handlePlatformFileDrop: NO drop target at x=' + x + ' y=' + y);
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
