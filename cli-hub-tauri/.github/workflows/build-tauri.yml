name: Build Tauri App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri macOS app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target aarch64-apple-darwin --bundles app
          tauriScript: npx tauri

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-macos-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.app
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri Windows MSI + NSIS
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi
          tauriScript: npx tauri

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload Windows NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows Portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-hub-windows-x86_64-portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/cli-hub-tauri.exe
          if-no-files-found: error
